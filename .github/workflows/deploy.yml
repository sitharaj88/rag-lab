name: Deploy RAG Lab to GitHub Pages

# Builds the MkDocs site and publishes it to GitHub Pages.
# Deployment is MANUAL: trigger it from the repo's Actions tab
# (Actions -> "Deploy RAG Lab to GitHub Pages" -> "Run workflow"),
# or via `gh workflow run deploy.yml`.
# One-time setup: Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-based "last updated" timestamps if enabled

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
